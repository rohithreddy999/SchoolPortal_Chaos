services:
  postgres:
    image: postgres:16
    container_name: school_fee_portal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
